        <!-- TASK: Create the HERO SECTION
             - Add a <section id="hero"> element

               * An <h2> with an exciting tagline for your game

        <!-- TASK: Create the FEATURES SECTION
             - Add a <section id="features"> element

        -->

             - Add a <section id="gallery"> element

                 - An <img> with src="images/your-file.jpg" and alt text
                 - A <figcaption> with a caption for the image
        -->





        <!-- TASK: Create the INFO SECTION
