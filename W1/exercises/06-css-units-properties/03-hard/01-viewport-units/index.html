<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Exercise: Viewport Units & Combined Properties</title>

    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero section - should fill the entire viewport -->
    <section class="hero">
        <!-- Main title -->
        <h1 class="hero-title">Welcome to My Website</h1>

        <!-- Subtitle -->
        <p class="hero-subtitle">A Journey Into Modern Web Design</p>

        <!-- Description paragraph -->
        <p class="hero-description">
            Discover the art of creating beautiful and functional websites
            using HTML and CSS. This exercise combines viewport units,
            color formats, and text properties to create a stunning hero section.
        </p>

        <!-- Call-to-action button -->
        <button class="cta-button">Get Started</button>
    </section>
</body>
</html>
